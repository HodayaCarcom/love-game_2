<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כמה אתה אוהב אותי?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff0f6;
      color: #222;
      text-align: center;
      overflow-x: hidden;
    }

    .screen {
      min-height: 100vh;
      display: none;
      padding: 40px 20px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .card {
      background: white;
      width: min(92%, 700px);
      border-radius: 28px;
      padding: 30px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      position: relative;
    }

    h1 {
      font-size: clamp(34px, 6vw, 64px);
      margin: 0 0 10px;
    }

    h2 {
      font-size: clamp(26px, 4vw, 42px);
      margin: 0 0 20px;
    }

    p {
      font-size: 20px;
      margin: 10px 0 20px;
    }

    .emoji-row {
      font-size: 34px;
      margin-bottom: 16px;
    }

    .big-emoji {
      font-size: 70px;
      margin: 10px 0;
    }

    .subtitle {
      color: #666;
      font-size: 18px;
      margin-bottom: 25px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 28px;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
      margin: 8px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .main-btn {
      background: #ff4fa0;
      color: white;
      box-shadow: 0 8px 20px rgba(255, 79, 160, 0.28);
    }

    .secondary-btn {
      background: #ffd6e8;
      color: #c21872;
    }

    .question-number {
      font-size: 18px;
      color: #c21872;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: clamp(28px, 4vw, 40px);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 10px;
    }

    .answer-btn {
      background: #ffe3ef;
      color: #8a1451;
      font-size: 20px;
      padding: 16px;
      border-radius: 16px;
    }

    .answer-btn:hover {
      background: #ffd2e6;
    }

    .feedback {
      min-height: 72px;
      margin-top: 18px;
      font-size: 28px;
      font-weight: bold;
    }

    .feedback small {
      display: block;
      font-size: 18px;
      font-weight: normal;
      margin-top: 8px;
    }

    .score {
      font-size: 56px;
      color: #ff4fa0;
      margin: 14px 0;
      font-weight: bold;
    }

    .result-text {
      font-size: 28px;
      margin: 12px 0 18px;
    }

    .tiny-note {
      font-size: 16px;
      color: #777;
      margin-top: 8px;
    }

    #confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .confetti {
      position: absolute;
      top: -20px;
      width: 12px;
      height: 18px;
      border-radius: 4px;
      animation: fall linear forwards;
      opacity: 0.9;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 1;
      }
    }

    .shake {
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div id="confetti-container"></div>

  <section id="start-screen" class="screen active">
    <div class="card">
      <div class="emoji-row">💖 🧸 😍 ✨</div>
      <h1>כמה אתה אוהב אותי?</h1>
      <p class="subtitle">נראה אותך עובר את המבחן הזה בלי לטעות 😏</p>

      <div class="big-emoji" id="mood-emoji">🥰</div>
      <div id="afraid-message" class="tiny-note">תבחר חכם...</div>

      <div style="display: flex; justify-content: center; gap: 12px; direction: ltr;">
        <button class="main-btn" onclick="startGame()">להתחיל משחק</button>
        <button class="secondary-btn" onclick="afraidYet()">מפחד?</button>
      </div>
    </div>
  </section>

  <section id="quiz-screen" class="screen">
    <div class="card">
      <div class="emoji-row">💗 🧸 💕</div>
      <div class="question-number" id="question-number"></div>
      <div class="question-text" id="question-text"></div>
      <div class="answers" id="answers-container"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </section>

  <section id="result-screen" class="screen">
    <div class="card">
      <div class="emoji-row">🎀 💖 🧸 ✨</div>
      <h2>סיימת את המבחן</h2>
      <div class="score" id="final-score">0%</div>
      <div class="result-text" id="result-text"></div>
      <p id="score-details"></p>
      <button class="main-btn" onclick="restartGame()">לשחק שוב</button>
    </div>
  </section>

  <script>
    const questions = [
      {
        question: "מה הצבע שאני הכי אוהבת?",
        answers: ["ורוד", "שחור", "כחול", "ירוק"],
        correct: "ורוד"
      },
      {
        question: "מה אני הכי אוהבת לאכול?",
        answers: ["סושי", "פיצה", "המבורגר", "סלט"],
        correct: "סושי"
      },
      {
        question: "מה אני עושה כשאני כועסת?",
        answers: ["בוכה", "צוחקת", "שותקת", "הולכת"],
        correct: "בוכה"
      },
      {
        question: "מה הכי משמח אותי?",
        answers: ["שוקולד", "פרחים", "שיחה", "סרט"],
        correct: "שוקולד"
      },
      {
        question: "איזה כינוי הכי מתאים לי?",
        answers: ["פעמונית", "נסיכה", "חמודה", "מותק"],
        correct: "פעמונית"
      },
      {
        question: "מה באמת המשמעות של 'לא משנה'? 😏",
        answers: ["להבין שמשנה מאוד", "להתעלם", "להגיד סבבה", "לעבור נושא"],
        correct: "להבין שמשנה מאוד"
      },
      {
        question: "איך הכי טוב לפייס אותי?",
        answers: ["שוקולד / מתנה / מכתב", "להגיד סליחה וזהו", "להתעלם", "לצחוק"],
        correct: "שוקולד / מתנה / מכתב"
      },
      {
        question: "מה הדייט המושלם בשבילי?",
        answers: ["לישון ביחד", "מסיבה", "קניון", "לבד"],
        correct: "לישון ביחד"
      },
      {
        question: "מה הכי מתאים לי?",
        answers: ["בית קפה", "ים", "סרט", "קניון"],
        correct: "בית קפה"
      },
      {
        question: "מי יותר חמוד?",
        answers: ["אני", "אני", "אני", "כל התשובות נכונות"],
        correct: "כל התשובות נכונות"
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let locked = false;
    let shuffledQuestions = [];
    let previousCorrectPositions = {};

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");

    const questionNumber = document.getElementById("question-number");
    const questionText = document.getElementById("question-text");
    const answersContainer = document.getElementById("answers-container");
    const feedback = document.getElementById("feedback");

    function showScreen(screen) {
      startScreen.classList.remove("active");
      quizScreen.classList.remove("active");
      resultScreen.classList.remove("active");
      screen.classList.add("active");
    }

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function shuffleAnswersWithVariation(questionObj, questionIndex) {
      let shuffledAnswers = [];
      let newCorrectIndex = -1;
      let tries = 0;

      do {
        shuffledAnswers = shuffleArray(questionObj.answers);
        newCorrectIndex = shuffledAnswers.indexOf(questionObj.correct);
        tries++;
      } while (
        shuffledAnswers.length > 1 &&
        previousCorrectPositions[questionIndex] === newCorrectIndex &&
        tries < 10
      );

      previousCorrectPositions[questionIndex] = newCorrectIndex;

      return {
        question: questionObj.question,
        answers: shuffledAnswers,
        correct: questionObj.correct
      };
    }

    function prepareQuestions() {
      const indexedQuestions = questions.map((q, index) => ({ ...q, originalIndex: index }));
      const shuffledQs = shuffleArray(indexedQuestions);

      shuffledQuestions = shuffledQs.map(q =>
        shuffleAnswersWithVariation(q, q.originalIndex)
      );
    }

    function startGame() {
      currentQuestion = 0;
      score = 0;
      locked = false;
      prepareQuestions();
      showScreen(quizScreen);
      renderQuestion();
    }

    function afraidYet() {
      const emoji = document.getElementById("mood-emoji");
      const msg = document.getElementById("afraid-message");

      emoji.textContent = "😠";
      msg.textContent = "לא יפה. תחזור ותתחיל כמו שצריך 😤";
      msg.classList.add("shake");

      setTimeout(() => {
        msg.classList.remove("shake");
        emoji.textContent = "🥰";
        msg.textContent = "תבחר חכם...";
      }, 1700);
    }

    function renderQuestion() {
      locked = false;
      feedback.innerHTML = "";

      const q = shuffledQuestions[currentQuestion];
      questionNumber.textContent = `שאלה ${currentQuestion + 1} מתוך ${shuffledQuestions.length}`;
      questionText.textContent = q.question;
      answersContainer.innerHTML = "";

      q.answers.forEach((answer) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = answer;
        btn.onclick = () => checkAnswer(answer);
        answersContainer.appendChild(btn);
      });
    }

    function checkAnswer(selectedAnswer) {
      if (locked) return;
      locked = true;

      const q = shuffledQuestions[currentQuestion];
      const allButtons = document.querySelectorAll(".answer-btn");

      allButtons.forEach((btn) => {
        btn.disabled = true;

        if (btn.textContent === q.correct) {
          btn.style.background = "#c9ffd8";
          btn.style.color = "#146c2e";
        } else if (btn.textContent === selectedAnswer && selectedAnswer !== q.correct) {
          btn.style.background = "#ffd4d4";
          btn.style.color = "#8b1e1e";
        }
      });

      if (selectedAnswer === q.correct) {
        score++;
        feedback.innerHTML = `🎉 יששש ידעת!<small>יפה מאוד, תשובה נכונה 💖</small>`;
        launchConfetti();
      } else {
        feedback.innerHTML = `🥺 אאוץ׳, זה היה אמור להיות קל<small>טוב נו... עדיין יש לך סיכוי להשתפר</small>`;
      }

      setTimeout(() => {
        currentQuestion++;
        if (currentQuestion < shuffledQuestions.length) {
          renderQuestion();
        } else {
          showResults();
        }
      }, 1800);
    }

    function showResults() {
      showScreen(resultScreen);

      const percent = Math.round((score / shuffledQuestions.length) * 100);
      document.getElementById("final-score").textContent = `${percent}%`;
      document.getElementById("score-details").textContent =
        `ענית נכון על ${score} מתוך ${shuffledQuestions.length} שאלות`;

      let text = "";
      if (percent === 100) {
        text = "אתה באמת אוהב אותי 💖";
        launchConfetti(120);
      } else if (percent >= 70) {
        text = "בסדר… יש על מה לעבוד 🙂";
      } else {
        text = "אנחנו צריכים שיחת יחסינו לאן 😤";
      }

      document.getElementById("result-text").textContent = text;
    }

    function restartGame() {
      showScreen(startScreen);
    }

    function launchConfetti(amount = 80) {
      const container = document.getElementById("confetti-container");
      const colors = ["#ff4fa0", "#ffd166", "#7bdff2", "#b2f7ef", "#cdb4db", "#ff8fab"];

      for (let i = 0; i < amount; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 2) + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        piece.style.opacity = Math.random().toFixed(2);
        container.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 4200);
      }
    }
  </script>
</body>
</html>
